# Configuration par défaut appliquée à toutes les applications spark-submit.

spark.master                     spark://spark-master:7077

# Journal d'événements pour le History Server (localhost:18080)
spark.eventLog.enabled           true
spark.eventLog.dir               file:/data/spark-events
spark.history.fs.logDirectory    file:/data/spark-events

# Métriques exposées au format Prometheus (scrapées par prometheus.yml)
spark.ui.prometheus.enabled      true
spark.metrics.namespace          spark

# Ressources demandées par application : on prend tout le cluster,
# ainsi defaultParallelism reflète directement la variante (2, 4 ou 8 cœurs).
spark.executor.cores             2
spark.executor.memory            1536m
